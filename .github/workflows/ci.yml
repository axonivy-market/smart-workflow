name: CI-Build

on:
  push:
  pull_request:
  schedule:
    - cron:  '21 21 * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    uses: vhhoang-axonivy/github-workflows/.github/workflows/ci.yml@v6
    with:
      javaVersion: 25
      cspellExtraWords: .github/cspell-extra-words.txt
    secrets:
      mvnArgs: |
       | sed -E "s|[0-9]. (WARNING) in ([^ ]*) \(at line ([0-9]+)\)(.*)|::\L\1 file=\2,line=\3::build issue\n\2@\3\4|g"\
       | sed -E "s|\[WARNING\] |::warning::|g"

  warnings-awareness:
    name: Compiler Warnings
    runs-on: ubuntu-latest
    needs:
      - build
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Compute warning delta and publish awareness check
        id: warn
        uses: actions/github-script@v9
        with:
          script: |
            const runWarningsAwareness = require('./.github/scripts/warnings-awareness.cjs');
            await runWarningsAwareness({ github, context, core });

      - name: Add warning summary
        run: |
          echo "## Compiler Warnings" >> "$GITHUB_STEP_SUMMARY"
          echo "- Current warnings: ${{ steps.warn.outputs.current }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Baseline warnings: ${{ steps.warn.outputs.baseline }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Delta: ${{ steps.warn.outputs.delta }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Check conclusion: ${{ steps.warn.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"