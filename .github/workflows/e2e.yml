name: E2E-Build

on:
  schedule:
    - cron:  '0 1 * * 0' # 1 AM on Sunday
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  build:
    uses: axonivy-market/github-workflows/.github/workflows/ci.yml@v6
    with:
      mvnArgs: -P e2e.test
      javaVersion: 25
      cspellExtraWords: .github/cspell-extra-words.txt
    secrets:
      mvnArgs: |
        -DOPEN_AI_API_KEY=${{ secrets.OPEN_AI_API_KEY }} \
        -DAZURE_OPEN_AI_API_KEY=${{ secrets.AZURE_OPEN_AI_API_KEY }} \
        -DAZURE_OPEN_AI_MODEL=${{ secrets.AZURE_OPEN_AI_MODEL }} \
        -DAZURE_OPEN_AI_DEPLOYMENT=${{ secrets.AZURE_OPEN_AI_DEPLOYMENT }} \
        -DAZURE_OPEN_AI_ENDPOINT=${{ secrets.AZURE_OPEN_AI_ENDPOINT }} \
        -DGEMINI_AI_API_KEY=${{ secrets.GEMINI_AI_API_KEY }} \
        -DXAI_API_KEY=${{ secrets.XAI_API_KEY }} \
        -DANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
