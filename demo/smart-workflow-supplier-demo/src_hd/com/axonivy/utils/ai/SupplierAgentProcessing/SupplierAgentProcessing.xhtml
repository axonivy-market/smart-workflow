<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <f:metadata>
    <f:event type="preRenderView" listener="#{supplierAgentProcessingBean.init}" />
  </f:metadata>
  <ui:composition template="/layouts/template/SupplierOnboardingTemplate.xhtml">

    <ui:param name="status"               value="VALIDATION" />
    <ui:param name="stepSubtitle"          value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierAgentProcessing/StepSubtitle')}" />
    <ui:param name="initialMessage"        value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierAgentProcessing/InitialMessage')}" />
    <ui:param name="guidanceListOverride"  value="#{supplierAgentProcessingBean.agentGuidance}" />

    <ui:define name="form-content">
      <h:form id="form">
        <ic:com.axonivy.utils.ai.components.SupplierAgentProcessingDetails
          bean="#{supplierAgentProcessingBean}"
          agentResponse="#{data.agentResponse}"
          readOnly="false" />
      </h:form>
    </ui:define>

    <ui:define name="footer-right">
      <p:commandButton id="continue"
        value="#{supplierAgentProcessingBean.continueButtonLabel}"
        styleClass="#{supplierAgentProcessingBean.continueButtonClass}"
        disabled="#{not supplierAgentProcessingBean.analysisComplete}"
        process="form"
        actionListener="#{logic.close}" />
    </ui:define>

  </ui:composition>
</h:body>
</html>
