#
# OpenTelemetry Java agent configuration file
#

# Export traces to Jaeger
otel.traces.exporter=otlp
# Do not export metrics
otel.metrics.exporter=none
# Do not export logs
otel.logs.exporter=none
# The name of the service
otel.service.name=Axon Ivy Engine
# The host and port where to report tracings to the ArizePhoenix tracing tool
otel.exporter.otlp.endpoint=http://127.0.0.1:6006
# otel.exporter.otlp.endpoint=http://127.0.0.1:4318
# The trace id will be propagated from the reverse-proxy and to the backend using a Jaeger specific HTTP Header 'uber-trace-id'
#otel.propagators=jaeger
otel.propagators=jaeger

otel.javaagent.debug=false
