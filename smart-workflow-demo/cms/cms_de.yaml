                    Panel0Title: Dokumenten-Upload & KI-Analyse
                    Panel0Desc: Sie haben ein PDF der Beschaffungsanfrage hochgeladen — und das war alles. Die KI erkannte die Dokumentstruktur, extrahierte alle Positionen und ordnete jedes Feld automatisch dem richtigen Formularfeld zu.
