                  onboarding:
                    FinishDemo:
                      HeroSub: Wir hoffen, dass Sie eine tolle Erfahrung mit <strong>Smart Workflow</strong> gemacht haben.<br/>Hier ist eine Zusammenfassung von allem, was die KI für Sie erledigt hat — autonom, präzise und vollständig nachvollziehbar.
                      PageTitle: Smart Workflow — KI-Prozesszusammenfassung
                      Panel0Desc: Der Onboarding-Prozess beginnt, wenn ein Lieferant seinen Antrag über das Smart Workflow-Portal einreicht. Alle erforderlichen Unterlagen — Gewerbeanmeldung, Steuerbescheinigungen und Finanzberichte — werden in dieser Phase hochgeladen.
                      Panel0Detail1: Lieferant vervollständigt Unternehmensprofil und Kontaktdaten
                      Panel0Detail2: Lädt erforderliche Zertifizierungs- und Finanzdokumente hoch
                      Panel0Detail3: Smart Workflow prüft die Vollständigkeit des Uploads vor der Verarbeitung
                      Panel0Title: Dokument-Upload
                      Panel1Desc: Die KI liest hochgeladene PDFs mit Vision-Language-Modellen, identifiziert Lieferantendatenfelder über mehrere Dokumente hinweg und befüllt das gesamte Onboarding-Formular automatisch — ohne manuelle Eingabe.
                      Panel1Detail1: PDF-Strukturen und Tabellen mit Vision-Language-Modellen analysiert
                      Panel1Detail2: Über 15 Lieferantendatenfelder automatisch identifiziert und extrahiert
                      Panel1Detail3: Das vollständige Onboarding-Formular mit validierten Daten automatisch befüllt
                      Panel1Title: KI-Dokumentenextraktion
                      Panel2Desc: Ein RAG-gestützter KI-Assistent steht auf jedem Bildschirm zur Verfügung — beantwortet Fragen zu Richtlinien, erklärt Compliance-Anforderungen und klärt Risikoschwellen in Echtzeit.
                      Panel2Detail1: Richtliniendokumente mittels Vektorähnlichkeitssuche abgerufen
                      Panel2Detail2: Fragen von Lieferanten und Prüfern während des gesamten Prozesses beantwortet
                      Panel2Detail3: Kontextuelle Compliance-Beratung auf jeder Prozessstufe bereitgestellt
                      Panel2Title: Kontextuelle F&A-Beratung
                      Panel3Desc: Die KI gleicht alle eingereichten Dokumente mit Beschaffungsrichtlinien ab und identifiziert fehlende Zertifizierungen, abgelaufene Nachweise und Compliance-Lücken — mit vollständiger Nachvollziehbarkeit.
                      Panel3Detail1: Alle Dokumente gegen 12+ Beschaffungsrichtlinien validiert
                      Panel3Detail2: Compliance-Lücken identifiziert und Elemente markiert, die Aufmerksamkeit erfordern
                      Panel3Detail3: Detaillierten Validierungsbericht mit erklärbaren Ergebnissen erstellt
                      Panel3Title: Dokumentvalidierung
                      Panel4Desc: Die KI berechnet einen zusammengesetzten Risiko-Score über drei Dimensionen — finanzielle Stabilität, Richtlinienkonformität und Zertifikatsgültigkeit — und liefert eine objektive, prüfbare Bewertung von 100.
                      Panel4Detail1: Finanzberichte auf Stabilitäts- und Liquiditätsindikatoren analysiert
                      Panel4Detail2: Compliance-Historie, Zertifizierungen und Richtlinienübereinstimmung querverwiesen
                      Panel4Detail3: Gewichteten zusammengesetzten Risiko-Score mit vollständiger Aufschlüsselung erstellt
                      Panel4Title: Risikoberechnung
                      Panel5Desc: 'Basierend auf dem vollständigen Kontext — extrahierte Daten, Risiko-Score, Validierungsergebnisse und Richtlinie — hat die KI den Prozessweg autonom entschieden: genehmigen, Klärung anfordern oder ablehnen.'
                      Panel5Detail1: Alle Eingaben gegen konfigurierbare Routing-Entscheidungsregeln ausgewertet
                      Panel5Detail2: Optimalen Ergebnispfad ohne menschliche Triage bestimmt
                      Panel5Detail3: Entsprechenden Workflow-Zweig mit vollständigem Prüfpfad ausgelöst
                      Panel5Title: Autonomes Routing
                      Panel6Desc: Der Onboarding-Antrag wurde vollständig bearbeitet und abgeschlossen. Alle extrahierten Daten, KI-Entscheidungen, Validierungsergebnisse und der vollständige Prüfpfad sind dauerhaft gespeichert und für Compliance-Überprüfungen zugänglich.
                      Panel6Detail1: Alle KI-Entscheidungen und Begründungen im permanenten Prüfprotokoll erfasst
                      Panel6Detail2: Lieferantendatensatz im System mit dem endgültigen Ergebnis aktualisiert
                      Panel6Detail3: Stakeholder über die Entscheidung und den Abschluss des Prozesses informiert
                      Panel6Title: Fall abgeschlossen
                    StartDemo:
                      AfterItem1: Lieferant lädt Dokumente einmalig über ein strukturiertes, geführtes Formular hoch
                      AfterItem2: Vision-KI extrahiert automatisch 15+ Felder aus PDFs in Sekunden — keine manuelle Eingabe
                      AfterItem3: 12+ Beschaffungsrichtlinien werden sofort mit vollständiger KI-Begründung geprüft
                      AfterItem4: 'Autonomes Routing: genehmigen, Klärung anfordern oder ablehnen — kein Triage erforderlich'
                      AfterItem5: Zusammengesetzter Risikowert aus finanzieller Stabilität, Compliance und Zertifikatsdaten
                      AfterItem6: Jede Entscheidung, jedes extrahierte Datum und jede KI-Begründung dauerhaft gespeichert
                      AiPoweredHeader: KI-gestützter Smart Workflow
                      BeforeItem1: Lieferant sendet Dokumente per E-Mail — Beschaffung sucht in Anhängen
                      BeforeItem2: Mitarbeiter lesen PDFs manuell und übertragen Daten in Tabellen oder ERP-Formulare
                      BeforeItem3: Compliance-Prüfungen sind ad-hoc, inkonsistent und erfolgen Tage nach der Einreichung
                      BeforeItem4: Genehmigungsrouting wird in Komiteesitzungen entschieden — Verzögerungen von Wochen
                      BeforeItem5: Risikobewertung basiert auf persönlichem Urteil ohne einheitlichen Standard
                      BeforeItem6: Entscheidungen verbleiben in E-Mail-Threads — kein strukturierter Prüfpfad für Compliance
                      BeforeYouStartDesc: Die Demo fordert Sie auf, Dokumente über ein Unternehmen hochzuladen, damit die KI Informationen extrahieren, Risiken bewerten und den Lieferanten bewerten kann. Wir haben diese Dokumente für Sie vorbereitet — laden Sie sie einfach herunter und verwenden Sie sie,
                        wenn Sie während der Demo dazu aufgefordert werden. Klicken Sie dann unten auf <strong>Daten generieren</strong>, um die Demo-Umgebung einzurichten.
