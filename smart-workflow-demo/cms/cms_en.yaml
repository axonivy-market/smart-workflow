  RagDemo:
    FraudDetectionPolicy: |
      Banking Fraud Detection Policy v2.1 — Effective January 2026

      Section 1: Transaction Monitoring
      All transactions exceeding $10,000 must be flagged for automated review by the Transaction Monitoring System (TMS).
      Real-time monitoring must detect unusual patterns including rapid successive withdrawals, round-dollar transfers, and structuring attempts.
      Cross-border transactions require enhanced due diligence regardless of amount.
      Peer-to-peer payment platforms must be monitored with the same rigor as traditional wire transfers.

      Section 2: Identity Verification
      Multi-factor authentication (MFA) is required for all wire transfers exceeding $5,000.
      KYC (Know Your Customer) checks must be refreshed every 12 months for standard accounts, every 6 months for high-risk accounts.
      Biometric verification is mandatory for changes to account beneficiary details.
      New account openings require government-issued photo ID plus one secondary proof of address.

      Section 3: Reporting Requirements
      Suspicious Activity Reports (SARs) must be filed with FinCEN within 30 calendar days of detection.
      Currency Transaction Reports (CTRs) are mandatory for cash transactions over $10,000, aggregated per customer per day.
      All SAR filings must be reviewed by the BSA/AML Compliance Officer before submission.
      Internal escalation of potential fraud must occur within 4 business hours of detection.

      Section 4: Internal Controls
      Dual approval is required for outgoing wire transfers above $50,000.
      Triple approval is required for international transfers above $200,000.
      Employee access to customer accounts must follow the least-privilege principle.
      Access to the fraud investigation system requires annual recertification.
      All overrides of automated fraud alerts must be documented with a written justification.

      Section 5: Customer Account Protection
      Accounts with 3 or more consecutive failed login attempts must be temporarily locked for 30 minutes.
      Unusual geographic access patterns (login from a new country within 2 hours of a domestic session) trigger step-up authentication.
      Customers must be notified within 24 hours of any detected unauthorized access attempt.
      Compromised debit/credit cards must be blocked within 15 minutes of confirmed fraud.

      Section 6: ATM and Card Fraud Prevention
      ATM terminals must be inspected for skimming devices weekly at minimum.
      Chip-and-PIN must be enforced for all in-person card transactions.
      Contactless payment limits are set at $250 per transaction, $1,000 cumulative per day.
      Any ATM dispensing anomaly must trigger an immediate out-of-service flag and investigation.
    SystemPrompt: |
      You are a Banking Fraud Detection agent responsible for evaluating transactions and flagging fraud risks.
      For every scenario you receive:
      1. Use the searchDocuments tool to retrieve the relevant sections of the fraud detection policy.
      2. Compare the scenario details against each retrieved policy rule.
      3. Return a structured result with:
         - answer: your verdict (BLOCK or APPROVE) with a detailed justification listing every policy violation
         - matches: the policy sections you retrieved, each with content, score (0.0-1.0), and metadata
      Be direct and decisive. Do not hedge or defer to other departments.
  ExternalRagDemo:
    InsurancePlans: |
      Corporate Health Insurance Plans 2026

      Plan A — Basic Health (Employee Only)
      Monthly premium: $150 (employee), $500 (employer contribution).
      Deductible: $2,000 individual. Out-of-pocket maximum: $5,000.
      Covers: Emergency care, hospitalization, primary care visits ($30 copay), generic prescriptions ($15 copay).
      Excludes: Dental, vision, mental health (available as add-ons).

      Plan B — Premium Health (Employee + Family)
      Monthly premium: $380 (employee), $1,100 (employer contribution).
      Deductible: $500 individual / $1,000 family. Out-of-pocket maximum: $2,500 individual / $5,000 family.
      Covers: All Plan A benefits plus dental, vision, mental health (20 sessions/year), specialist visits ($50 copay), brand prescriptions ($40 copay), telemedicine at no cost.

      Plan C — High-Deductible Health Plan (HDHP) with HSA
      Monthly premium: $80 (employee), $600 (employer contribution).
      Deductible: $3,500 individual / $7,000 family.
      HSA employer contribution: $750/year (individual), $1,500/year (family).
      Covers: Preventive care at 100% before deductible; 80/20 cost sharing after deductible.

      Enrollment: Open enrollment runs November 1–30 each year.
      Life events (marriage, birth, adoption) allow mid-year changes within 30 days.
      Coverage begins on the first day of the month following enrollment.
    CompanyRules: |
      Company Rules and Compliance Policy 2026

      Section 1: Code of Conduct
      All employees must act with integrity, transparency, and respect in all business interactions.
      Conflicts of interest must be disclosed to HR within 10 business days of identification.
      Employees may not accept gifts valued over $100 from vendors, clients, or partners.
      Violations may result in disciplinary action up to and including termination.

      Section 2: Work Hours and Remote Work
      Standard work week: 40 hours (Mon–Fri, 9 AM–5 PM local time).
      Flexible hours are available with manager approval; core hours are 10 AM–3 PM.
      Remote work is permitted up to 3 days per week for eligible roles.
      Overtime must be pre-approved by the direct manager; unauthorized overtime is not compensated.

      Section 3: Data Privacy and Security
      Employees must not share company data, customer records, or proprietary information with unauthorized parties.
      All company devices must have full-disk encryption enabled.
      Passwords must be at least 14 characters, changed every 90 days, not reused within 12 cycles.
      Suspected data breaches must be reported to IT Security within 1 hour of detection.

      Section 4: Anti-Harassment and Non-Discrimination
      The company maintains a zero-tolerance policy for harassment, discrimination, or retaliation.
      Complaints must be submitted to HR or via the anonymous ethics hotline within 90 days of the incident.
      All complaints are investigated within 15 business days.

      Section 5: Travel and Expenses
      Business travel requires manager approval at least 5 business days in advance.
      Economy class is standard for flights under 6 hours; business class requires VP approval.
      Meal allowance: $75/day domestic, $100/day international.
      All expenses must be submitted within 30 days of travel via the expense management system.
    Benefits: |
      Employee Benefits Overview 2026

      Paid Time Off (PTO)
      Years 0–2: 15 days PTO + 5 sick days per year.
      Years 3–5: 20 days PTO + 5 sick days per year.
      Years 6+: 25 days PTO + 7 sick days per year.
      Unused PTO rollover: maximum 10 days carried into the next calendar year. Unused sick days do not roll over.

      Retirement Plan (401k)
      Company matches 100% of employee contributions up to 4% of base salary.
      Additional 50% match on contributions between 4% and 6% of salary.
      Vesting schedule: 25% per year, fully vested after 4 years.

      Parental Leave
      Primary caregiver: 16 weeks fully paid leave.
      Secondary caregiver: 6 weeks fully paid leave.
      Adoptive and foster parents are eligible for the same benefits.
      Must be taken within 12 months of birth, adoption, or placement.

      Learning and Development
      Annual learning budget: $2,000 per employee (courses, certifications, conferences, books).
      Tuition reimbursement: up to $10,000/year for job-related degrees (requires 2-year post-graduation commitment).

      Other Benefits
      Employee Assistance Program (EAP): free confidential counseling up to 10 sessions/year.
      Gym membership subsidy: up to $50/month reimbursed.
      Commuter benefits: pre-tax transit and parking up to $315/month.
      Life insurance: 2x annual salary employer-paid; supplemental coverage available.
      Stock options: eligible employees receive annual grants vesting over 4 years.
