  RagDemo:
    FraudDetectionPolicy: |
      Banking Fraud Detection Policy v2.1 â€” Effective January 2026

      Section 1: Transaction Monitoring
      All transactions exceeding $10,000 must be flagged for automated review by the Transaction Monitoring System (TMS).
      Real-time monitoring must detect unusual patterns including rapid successive withdrawals, round-dollar transfers, and structuring attempts.
      Cross-border transactions require enhanced due diligence regardless of amount.
      Peer-to-peer payment platforms must be monitored with the same rigor as traditional wire transfers.

      Section 2: Identity Verification
      Multi-factor authentication (MFA) is required for all wire transfers exceeding $5,000.
      KYC (Know Your Customer) checks must be refreshed every 12 months for standard accounts, every 6 months for high-risk accounts.
      Biometric verification is mandatory for changes to account beneficiary details.
      New account openings require government-issued photo ID plus one secondary proof of address.

      Section 3: Reporting Requirements
      Suspicious Activity Reports (SARs) must be filed with FinCEN within 30 calendar days of detection.
      Currency Transaction Reports (CTRs) are mandatory for cash transactions over $10,000, aggregated per customer per day.
      All SAR filings must be reviewed by the BSA/AML Compliance Officer before submission.
      Internal escalation of potential fraud must occur within 4 business hours of detection.

      Section 4: Internal Controls
      Dual approval is required for outgoing wire transfers above $50,000.
      Triple approval is required for international transfers above $200,000.
      Employee access to customer accounts must follow the least-privilege principle.
      Access to the fraud investigation system requires annual recertification.
      All overrides of automated fraud alerts must be documented with a written justification.

      Section 5: Customer Account Protection
      Accounts with 3 or more consecutive failed login attempts must be temporarily locked for 30 minutes.
      Unusual geographic access patterns (login from a new country within 2 hours of a domestic session) trigger step-up authentication.
      Customers must be notified within 24 hours of any detected unauthorized access attempt.
      Compromised debit/credit cards must be blocked within 15 minutes of confirmed fraud.

      Section 6: ATM and Card Fraud Prevention
      ATM terminals must be inspected for skimming devices weekly at minimum.
      Chip-and-PIN must be enforced for all in-person card transactions.
      Contactless payment limits are set at $250 per transaction, $1,000 cumulative per day.
      Any ATM dispensing anomaly must trigger an immediate out-of-service flag and investigation.
    SystemPrompt: |
      You are a Banking Fraud Detection agent responsible for evaluating transactions and flagging fraud risks.
      For every scenario you receive:
      1. Use the searchDocuments tool to retrieve the relevant sections of the fraud detection policy.
      2. Compare the scenario details against each retrieved policy rule.
      3. Return a structured result with:
         - answer: your verdict (BLOCK or APPROVE) with a detailed justification listing every policy violation
         - matches: the policy sections you retrieved, each with content, score (0.0-1.0), and metadata
      Be direct and decisive. Do not hedge or defer to other departments.
