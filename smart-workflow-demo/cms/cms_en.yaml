  RagDemo:
    FraudDetectionPolicy: |
      Banking Fraud Detection Policy v2.1 — Effective January 2026

      Section 1: Transaction Monitoring
      All transactions exceeding $10,000 must be flagged for automated review by the Transaction Monitoring System (TMS).
      Real-time monitoring must detect unusual patterns including rapid successive withdrawals, round-dollar transfers, and structuring attempts.
      Cross-border transactions require enhanced due diligence regardless of amount.
      Peer-to-peer payment platforms must be monitored with the same rigor as traditional wire transfers.

      Section 2: Identity Verification
      Multi-factor authentication (MFA) is required for all wire transfers exceeding $5,000.
      KYC (Know Your Customer) checks must be refreshed every 12 months for standard accounts, every 6 months for high-risk accounts.
      Biometric verification is mandatory for changes to account beneficiary details.
      New account openings require government-issued photo ID plus one secondary proof of address.

      Section 3: Reporting Requirements
      Suspicious Activity Reports (SARs) must be filed with FinCEN within 30 calendar days of detection.
      Currency Transaction Reports (CTRs) are mandatory for cash transactions over $10,000, aggregated per customer per day.
      All SAR filings must be reviewed by the BSA/AML Compliance Officer before submission.
      Internal escalation of potential fraud must occur within 4 business hours of detection.

      Section 4: Internal Controls
      Dual approval is required for outgoing wire transfers above $50,000.
      Triple approval is required for international transfers above $200,000.
      Employee access to customer accounts must follow the least-privilege principle.
      Access to the fraud investigation system requires annual renewal of access rights.
      All overrides of automated fraud alerts must be documented with a written justification.

      Section 5: Customer Account Protection
      Accounts with 3 or more consecutive failed login attempts must be temporarily locked for 30 minutes.
      Unusual geographic access patterns (login from a new country within 2 hours of a domestic session) trigger step-up authentication.
      Customers must be notified within 24 hours of any detected unauthorized access attempt.
      Compromised debit/credit cards must be blocked within 15 minutes of confirmed fraud.

      Section 6: ATM and Card Fraud Prevention
      ATM terminals must be inspected for skimming devices weekly at minimum.
      Chip-and-PIN must be enforced for all in-person card transactions.
      Contactless payment limits are set at $250 per transaction, $1,000 cumulative per day.
      Any ATM dispensing anomaly must trigger an immediate out-of-service flag and investigation.
    SystemPrompt: |
      You are a Banking Fraud Detection agent responsible for evaluating transactions and flagging fraud risks.
      For every scenario you receive:
      1. Use the searchDocuments tool to retrieve the relevant sections of the fraud detection policy.
      2. Compare the scenario details against each retrieved policy rule.
      3. Return a structured result with:
         - answer: your verdict (BLOCK or APPROVE) with a detailed justification listing every policy violation
         - matches: the policy sections you retrieved, each with content, score (0.0-1.0), and metadata
      Be direct and decisive. Do not hedge or defer to other departments.
  SupplierOnboarding:
    PolicyRules: |
      Supplier Onboarding Policy — BuildRight Supply Co.

      ── SHARED SIGNAL LISTS ─────────────────────────────────────────────────
      When a rule says "scan for MANUFACTURING SIGNALS", look across ALL available
      context (business purpose, product/service categories, company description,
      commercial register objects, extracted document contents) for:
        manufacturing, industrial, production, fabrication, assembly, processing plant,
        factory, machining, casting, welding, chemical processing.

      When a rule says "scan for IT/DATA SIGNALS", look across ALL available context for:
        IT, software, SaaS, platform, digital, cloud, data center, data processing,
        HR systems, payroll systems, CRM, ERP, analytics, marketing technology,
        recruitment technology, managed services, system integration, cybersecurity,
        or any service that involves operating digital systems, networks, or data
        infrastructure, or that involves access to client personal data.
      ────────────────────────────────────────────────────────────────────────

      SECTION A — LEGAL & REGISTRATION

      RULE 1 — COMMERCIAL REGISTER DOCUMENT
        Applies to: all new suppliers.
        FAILURE:  no commercial register document is present in the extracted documents.
        WARNING:  N/A
        PASSED:   a commercial register document is present.

      RULE 2 — SUPPLIER SELF-DECLARATION
        Applies to: all new suppliers.
        FAILURE:  N/A
        WARNING:  no self-declaration document is present.
        PASSED:   a self-declaration document is present.

      SECTION B — CERTIFICATIONS
      For every certification rule, also apply the following expiry checks to the
      certificate when it IS present (use today's date for comparison):
        FAILURE if the certificate's valid-until date is already in the past (expired).
        WARNING if the certificate expires within the next 6 months.

      RULE 3 — ISO 9001 QUALITY MANAGEMENT
        Applies to: suppliers with expected annual volume > EUR 50,000.
        FAILURE:  annual volume > EUR 50,000 AND ISO 9001 certificate is absent
                  OR the present certificate is expired.
        WARNING:  the certificate expires within 6 months.
        PASSED:   annual volume <= EUR 50,000 (rule not applicable, state this clearly)
                  OR a valid ISO 9001 certificate is present and not expiring soon.

      RULE 4 — ISO 14001 ENVIRONMENTAL MANAGEMENT
        Applies to: suppliers where MANUFACTURING SIGNALS are found.
        FAILURE:  MANUFACTURING SIGNALS found AND ISO 14001 certificate is absent
                  OR the present certificate is expired.
        WARNING:  the certificate expires within 6 months.
        PASSED:   no MANUFACTURING SIGNALS found (rule not applicable, state this clearly)
                  OR a valid ISO 14001 certificate is present and not expiring soon.

      RULE 5 — ISO 27001 INFORMATION SECURITY
        Applies to: suppliers where IT/DATA SIGNALS are found.
        FAILURE:  IT/DATA SIGNALS found AND ISO 27001 certificate is absent
                  OR the present certificate is expired.
        WARNING:  signals are ambiguous or unclear (state what clarification is needed)
                  OR the certificate expires within 6 months.
        PASSED:   no IT/DATA SIGNALS found (rule not applicable, state this clearly)
                  OR a valid ISO 27001 certificate is present and not expiring soon.

      RULE 6 — GDPR DATA PROCESSING AGREEMENT
        Applies to: suppliers where IT/DATA SIGNALS are found.
        FAILURE:  IT/DATA SIGNALS found AND GDPR DPA document is absent.
        WARNING:  signals are ambiguous or unclear (state what clarification is needed).
        PASSED:   no IT/DATA SIGNALS found (rule not applicable, state this clearly)
                  OR a GDPR DPA document is present.

      SECTION C — GEOGRAPHIC

      RULE 7 — EU/EEA ORIGIN PREFERENCE
        Applies to: all suppliers.
        EU/EEA country list: DE, FR, NL, BE, AT, CH, PL, IT, ES, PT, SE, DK, FI, NO.
        FAILURE:  N/A
        WARNING:  supplier country is outside the EU/EEA list above.
        PASSED:   supplier country is in the EU/EEA list.

      SECTION D — FINANCIAL HEALTH

      RULE 8 — ANNUAL REPORT & FINANCIAL SOUNDNESS
        Applies to: all suppliers (report is strongly recommended but not mandatory).
        If no annual report is present:
          WARNING:  annual report is absent — financial health cannot be assessed.
          Skip sub-checks below.
        If an annual report IS present, evaluate all figures strictly and precisely
        (do not round or approximate — use exact numbers from the document):
          FAILURE:  net loss reported for 2 or more consecutive years.
          FAILURE:  total equity is negative (balance-sheet insolvency risk).
          FAILURE:  auditor issued a going-concern qualification or doubt note.
          WARNING:  debt-to-equity ratio exceeds 3.0.
          WARNING:  revenue declined more than 20% year-on-year.
          WARNING:  operating cash flow is negative while net income is positive
                    (quality-of-earnings concern).
          PASSED:   report is present and none of the above conditions are triggered.
    PolicyValidationSystemPrompt: |
      You are a supplier policy compliance expert for BuildRight Supply Co.
      Evaluate the supplied supplier data strictly against the policy rules below.

      POLICY RULES:
      {POLICY_RULES}

      INSTRUCTIONS:
      For each rule, create one ValidationFinding with:
        - severity: "PASSED", "WARNING", or "FAILURE"
        - message: a clear, specific explanation of what was checked and the outcome
          (include relevant values such as country, volume, cert expiry date, financial figures)
        - source: "built-in policy rule"

      Check all 8 rules across all 4 sections. For every rule:
      - If the rule's "Applies to" condition does not match this supplier, emit PASSED
        with a short note explaining why the rule is not applicable. Never skip a rule silently.
      - If the rule APPLIES and the requirement IS MET (e.g., the required document is present
        in the extracted documents, or the required condition is satisfied), emit PASSED with
        a short note confirming compliance. Do NOT emit FAILURE or WARNING when the requirement is met.
      - If the rule applies and the requirement is NOT met, emit FAILURE.
      - If a rule has multiple sub-checks (e.g. Rule 8), emit one finding per triggered
        sub-check, each with its own severity. Emit a single PASSED finding only when
        none of the sub-checks are triggered.

      DOCUMENT TYPE KEY — MANDATORY for every FAILURE or WARNING finding about a missing
      or required document/certificate. Always populate documentTypeKey:
        - Missing certificate (ISO 9001, ISO 14001, ISO 27001, GDPR DPA, etc.):
          use CERTIFICATION:<ENUM_NAME>, e.g. CERTIFICATION:ISO_9001, CERTIFICATION:GDPR_DPA
        - Missing commercial register: DOCUMENT:COMMERCIAL_REGISTER
        - Missing self-declaration: DOCUMENT:SELF_DECLARATION
        - Missing annual report: DOCUMENT:ANNUAL_REPORT
        - Missing bank statement: DOCUMENT:BANK_STATEMENT
        Leave null only for non-document findings (duplicate checks, general data issues).

      Return a PolicyValidationResult with the complete list of findings.
      Leave the processingStep field null — it is set by the calling process.
KnowledgeBase:
  procurement:
    ProcurementRequest: |
      # Material Procurement Request — Business Process Knowledge Base

      ## Process Overview
      The Material Procurement Request process allows construction project teams to formally request materials.
      It follows a structured two-step workflow: the Requester submits the request form, and the Purchasing Manager reviews and approves or rejects it.
      All requests are tracked by status throughout the lifecycle.

      ## Workflow Steps

      ### Step 1: Fill Procurement Request (Requester)
      The Requester completes the material procurement request form, providing details such as required materials, quantities, project context, and justification.
      Upon submission, the request status is set to SUBMITTED and the record is saved in the system.
      The case is tagged with the procurement request ID for downstream tracking.

      ### Step 2: Review Procurement Request (Purchasing Manager)
      The Purchasing Manager receives the task to review the submitted request.
      They examine the request details and provide one of two decisions:
      - APPROVED: The request is authorized and marked as APPROVED.
      - REJECTED: The request is denied and marked as REJECTED.
      The Purchasing Manager may also add an approval comment to document the rationale for the decision.

      ## Request Statuses
      - SUBMITTED: The request has been filled in and submitted by the Requester, and is awaiting review.
      - APPROVED: The Purchasing Manager has authorized the procurement request.
      - REJECTED: The Purchasing Manager has denied the procurement request.

      ---

      ## Common Questions and Answers

      Q: Who can submit a material procurement request?
      A: Any team member assigned to the Requester role can initiate and submit a material procurement request through the system.

      Q: What information is required when submitting a request?
      A: The request form requires details about the materials needed, quantities, the associated construction project, and a justification for the procurement.

      Q: Who is responsible for reviewing the request?
      A: The Purchasing Manager is exclusively responsible for reviewing, approving, or rejecting all procurement requests.

      Q: How will I know if my request has been reviewed?
      A: The status of your request will be updated to either APPROVED or REJECTED once the Purchasing Manager completes their review. You can track the status in the system at any time.

      Q: Can I modify my request after it has been submitted?
      A: Once a request is submitted its status is set to SUBMITTED and it cannot be edited. If corrections are needed, contact the Purchasing Manager directly.

      Q: What happens after my request is approved?
      A: An APPROVED status confirms authorization to proceed with material acquisition. The procurement team will coordinate the fulfillment of the materials.

      Q: What should I do if my request is rejected?
      A: A rejected request includes comments from the Purchasing Manager explaining the reason for the decision. Review the comments, address the concerns, and submit a new request with the necessary adjustments.

      Q: Can the Purchasing Manager add remarks to the decision?
      A: Yes. The Purchasing Manager can include an approval comment when reviewing a request to document the justification or provide guidance to the Requester.

      Q: How is a procurement request identified in the system?
      A: Each procurement request is assigned a unique ID upon creation. This ID is stored as a case custom field (procurementRequestId) and is used to link the request across workflow steps.

      Q: What is the typical flow for a procurement request?
      A: The process starts when a Requester submits the form (status: SUBMITTED). The case is then assigned to the Purchasing Manager for review. The manager approves or rejects the request (status: APPROVED or REJECTED), completing the workflow.

