                    FinishDemo:
                      HeroSub: We hope you had a great experience with <strong>Smart Workflow</strong>.<br/>Here is a summary of everything the AI handled for you — autonomously, accurately, and fully auditable.
                      PageTitle: Smart Workflow — AI Process Summary
                      Panel0Desc: The onboarding process begins when a supplier submits their application through the Smart Workflow portal. All required supporting documents — business registration, tax certificates, and financial statements — are uploaded at this stage.
                      Panel0Detail1: Supplier completes company profile and contact information
                      Panel0Detail2: Uploads required certification and financial documents
                      Panel0Detail3: Smart Workflow validates upload completeness before processing
                      Panel0Num: Step 01 of 07
                      Panel0Tag1: Supplier Portal
                      Panel0Tag2: Document Upload
                      Panel0Tag3: Workflow Start
                      Panel0Title: Document Upload
                      Panel1Desc: AI reads uploaded PDFs using vision-language models, identifies supplier data fields across multiple documents, and automatically pre-fills the entire onboarding form — zero manual typing required.
                      Panel1Detail1: Parsed PDF structures and tables using vision-language models
                      Panel1Detail2: Identified and extracted 15+ supplier data fields automatically
                      Panel1Detail3: Auto-populated the complete onboarding form with validated data
                      Panel1Num: Step 02 of 07
                      Panel1Tag1: LLM
                      Panel1Tag2: Structured Output
                      Panel1Tag3: Multi-doc
                      Panel1Tag4: Zero Manual Entry
                      Panel1Title: AI Document Extraction
                      Panel2Desc: A RAG-powered AI assistant is available at every screen — answering questions about policy rules, explaining compliance requirements, and clarifying risk thresholds in real time throughout the process.
                      Panel2Detail1: Retrieved policy documents using vector similarity search
                      Panel2Detail2: Answered supplier and reviewer questions throughout the process
                      Panel2Detail3: Provided contextual compliance guidance at each step
                      Panel2Num: Step 03 of 07
                      Panel2Tag1: RAG
                      Panel2Tag2: Vector Search
                      Panel2Tag3: Chat Agent
                      Panel2Tag4: Context-aware
                      Panel2Title: Contextual Q&A Guidance
                      Panel3Desc: AI cross-checks all submitted documents against procurement policy rules, identifying missing certifications, expired credentials, and compliance gaps — with complete reasoning and full traceability.
                      Panel3Detail1: Validated all documents against 12+ procurement policy rules
                      Panel3Detail2: Identified compliance gaps and flagged items requiring attention
                      Panel3Detail3: Generated a detailed validation report with explainable findings
                      Panel3Num: Step 04 of 07
                      Panel3Tag1: Policy Engine
                      Panel3Tag2: Cross-reference
                      Panel3Tag3: Explainable AI
                      Panel3Tag4: Traceability
                      Panel3Title: Document Validation
                      Panel4Desc: AI computes a composite risk score across three dimensions — financial stability, policy compliance, and certification validity — delivering an objective, auditable rating out of 100.
                      Panel4Detail1: Analysed financial statements for stability and liquidity indicators
                      Panel4Detail2: Cross-referenced compliance history, certifications, and policy alignment
                      Panel4Detail3: Produced a weighted composite risk score with full breakdown
                      Panel4Num: Step 05 of 07
                      Panel4Tag1: Financial Analysis
                      Panel4Tag2: Risk Model
                      Panel4Tag3: Weighted Scoring
                      Panel4Tag4: Scored /100
                      Panel4Title: Risk Calculation
                      Panel5Desc: 'Based on the complete context — extracted data, risk score, validation findings, and policy — the AI decided the process path autonomously: approve, request clarification, or decline.'
                      Panel5Detail1: Evaluated all inputs against configurable routing decision rules
                      Panel5Detail2: Determined the optimal outcome path without human triage
                      Panel5Detail3: Triggered the appropriate workflow branch with a full audit trail
                      Panel5Num: Step 06 of 07
                      Panel5Tag1: Decision Engine
                      Panel5Tag2: Agentic AI
                      Panel5Tag3: Zero Triage
                      Panel5Tag4: Autonomous
                      Panel5Title: Autonomous Routing
                      Panel6Desc: The onboarding request has been fully processed and closed. All extracted data, AI decisions, validation findings, and the complete audit trail are permanently recorded and accessible for compliance review.
                      Panel6Detail1: All AI decisions and reasoning recorded in the permanent audit log
                      Panel6Detail2: Supplier record updated in the system with the final outcome
                      Panel6Detail3: Stakeholders notified of the decision and process completion
                      Panel6Num: Step 07 of 07
                      Panel6Tag1: Audit Trail
                      Panel6Tag2: Compliance
                      Panel6Tag3: Process Complete
                      Panel6Title: Case Closed
