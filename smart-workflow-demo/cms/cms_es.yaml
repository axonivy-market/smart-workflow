  SupplierOnboarding:
    PolicyRules: |
      Política de incorporación de proveedores — BuildRight Supply Co.

      REGLA 1 — ISO 9001 REQUERIDA para volumen anual > 50.000 EUR.
      FALLO si falta el certificado. ADVERTENCIA si expira en 6 meses.

      REGLA 2 — ISO 14001 REQUERIDA para proveedores de fabricación, industriales o de producción.
      FALLO si el certificado falta para un proveedor de fabricación/industrial/producción.
      ADVERTENCIA si expira en 6 meses.

      REGLA 3 — PROVEEDOR DE LA UE/EEE PREFERIDO para departamentos de la UE.
      Países: DE, FR, NL, BE, AT, CH, PL, IT, ES, PT, SE, DK, FI, NO.
      ADVERTENCIA si el país del proveedor está fuera de la UE/EEE.

      REGLA 4 — DPA RGPD REQUERIDO si el proveedor maneja datos personales.
      Examinar TODO el contexto disponible — propósito comercial, categorías de productos/servicios,
      descripción de la empresa, objeto del registro mercantil y contenidos de documentos extraídos —
      en busca de cualquiera de estas señales: IT, software, SaaS, plataforma, digital, nube,
      centro de datos, procesamiento de datos, sistemas de RRHH, nóminas, CRM, ERP, analítica,
      tecnología de marketing, tecnología de reclutamiento, servicios gestionados, integración de
      sistemas o cualquier servicio que implique acceso a datos personales de clientes.
      FALLO si falta el DPA del RGPD y se detecta alguna de estas señales.
      ADVERTENCIA (no FALLO) si las señales son ambiguas — indicar que se requiere aclaración.
      APROBADO solo cuando se puede confirmar claramente que el proveedor no tiene contacto con datos personales.

      REGLA 5 — VENCIMIENTO DE CERTIFICADOS: todos los certificados deben ser válidos al menos 6 meses más desde hoy.
      ADVERTENCIA si vence en 6 meses. FALLO si ya ha vencido.

      REGLA 6 — DOCUMENTO DEL REGISTRO MERCANTIL REQUERIDO para todos los nuevos proveedores.
      FALLO si no hay documento de registro mercantil.

      REGLA 7 — AUTODECLARACIÓN DEL PROVEEDOR RECOMENDADA para todos los nuevos proveedores.
      ADVERTENCIA si falta la autodeclaración.

      REGLA 8 — ISO 27001 REQUERIDO para proveedores de TI y procesamiento de datos.
      Examinar TODO el contexto disponible — propósito comercial, categorías de productos/servicios,
      descripción de la empresa, objeto del registro mercantil y contenidos de documentos extraídos —
      en busca de cualquiera de estas señales: software, SaaS, plataforma, digital, servicios IT,
      nube, centro de datos, procesamiento de datos, ciberseguridad, sistemas de RRHH, nóminas,
      CRM, ERP, analítica, tecnología de marketing, tecnología de reclutamiento, servicios gestionados,
      integración de sistemas o cualquier producto/servicio que implique suministrar u operar sistemas
      digitales, redes o infraestructura de datos.
      FALLO si falta ISO 27001 y se detecta alguna de estas señales.
      ADVERTENCIA (no FALLO) si las señales son ambiguas — indicar que se requiere aclaración.
      APROBADO solo cuando se puede confirmar claramente que el proveedor no realiza actividades de TI o datos.

      REGLA 9 — INFORME ANUAL: el informe financiero del último ejercicio es opcional pero muy recomendado.
      ADVERTENCIA si el informe anual está ausente.
      Cuando el informe anual esté PRESENTE, analice todas las cifras financieras de forma estricta y cuidadosa:
        - Tendencia de ingresos: FALLO si hay pérdida neta durante 2 o más años consecutivos.
        - Patrimonio neto: FALLO si el patrimonio total es negativo (riesgo de insolvencia contable).
        - Ratio deuda-capital: ADVERTENCIA si el ratio supera 3,0.
        - Caída de ingresos: ADVERTENCIA si los ingresos disminuyeron más del 20% interanual.
        - Empresa en funcionamiento: FALLO si el auditor emitió una calificación de duda sobre la continuidad.
        - Flujo de caja: ADVERTENCIA si el flujo de caja operativo es negativo mientras el beneficio neto es positivo.
      No redondear ni aproximar — utilice las cifras exactas del documento.
    PolicyValidationSystemPrompt: |
      Usted es un experto en cumplimiento de políticas de proveedores para BuildRight Supply Co.
      Evalúe los datos del proveedor proporcionados estrictamente según las reglas de política indicadas a continuación.

      REGLAS DE POLÍTICA:
      {POLICY_RULES}

      INSTRUCCIONES:
      Para cada regla aplicable, cree un ValidationFinding con:
        - severity: "PASSED", "WARNING" o "FAILURE"
        - message: una explicación clara de lo que se verificó y el resultado
        - source: "built-in policy rule"

      Verifique siempre todas las reglas. Para cada regla:
      - Si la regla NO aplica a este proveedor: emita PASSED con una nota de explicación.
      - Si la regla APLICA y el requisito ESTÁ CUMPLIDO (p. ej., el documento requerido está en los documentos extraídos): emita PASSED confirmando el cumplimiento. No emita FAILURE ni WARNING cuando el requisito está satisfecho.
      - Si la regla aplica y el requisito NO está cumplido: emita FAILURE.

      CLAVE DE TIPO DE DOCUMENTO — Obligatoria para cada hallazgo FAILURE o WARNING sobre un documento faltante.
      Siempre completar documentTypeKey:
        - Certificados faltantes: CERTIFICATION:<ENUM_NAME>, p. ej. CERTIFICATION:ISO_9001, CERTIFICATION:GDPR_DPA
        - Registro comercial faltante: DOCUMENT:COMMERCIAL_REGISTER
        - Autodeclaración faltante: DOCUMENT:SELF_DECLARATION
        - Informe anual faltante: DOCUMENT:ANNUAL_REPORT
        Solo dejar null para hallazgos no documentales (duplicados, problemas de datos generales).

      Devuelva un PolicyValidationResult con la lista completa de hallazgos.
      Deje el campo processingStep en null — lo establece el proceso que llama.
