                    FinishDemo:
                      HeroSub: Esperamos que haya tenido una gran experiencia con <strong>Smart Workflow</strong>.<br/>Aquí hay un resumen de todo lo que la IA gestionó por usted — de forma autónoma, precisa y completamente auditable.
                      PageTitle: Smart Workflow — Resumen del proceso de IA
                      Panel0Desc: El proceso de incorporación comienza cuando un proveedor envía su solicitud a través del portal Smart Workflow. Todos los documentos de apoyo requeridos — registro empresarial, certificados fiscales y estados financieros — se cargan en esta etapa.
                      Panel0Detail1: El proveedor completa el perfil de la empresa y la información de contacto
                      Panel0Detail2: Carga los documentos de certificación y financieros requeridos
                      Panel0Detail3: Smart Workflow valida la integridad de la carga antes del procesamiento
                      Panel0Title: Carga de documentos
                      Panel1Desc: La IA lee los PDFs cargados utilizando modelos de visión-lenguaje, identifica campos de datos de proveedores en múltiples documentos y rellena automáticamente todo el formulario de incorporación — sin escritura manual.
                      Panel1Detail1: Estructuras y tablas de PDF analizadas con modelos de visión-lenguaje
                      Panel1Detail2: Más de 15 campos de datos de proveedores identificados y extraídos automáticamente
                      Panel1Detail3: Formulario de incorporación completo rellenado automáticamente con datos validados
                      Panel1Title: Extracción de documentos con IA
                      Panel2Desc: Un asistente de IA basado en RAG está disponible en cada pantalla — respondiendo preguntas sobre reglas de políticas, explicando requisitos de cumplimiento y aclarando umbrales de riesgo en tiempo real.
                      Panel2Detail1: Documentos de política recuperados mediante búsqueda de similitud vectorial
                      Panel2Detail2: Respondidas las preguntas de proveedores y revisores durante todo el proceso
                      Panel2Detail3: Orientación contextual de cumplimiento proporcionada en cada paso
                      Panel2Title: Guía contextual de P&R
                      Panel3Desc: La IA compara todos los documentos enviados con las reglas de política de adquisiciones, identificando certificaciones faltantes, credenciales vencidas y brechas de cumplimiento — con razonamiento completo y trazabilidad total.
                      Panel3Detail1: Todos los documentos validados contra más de 12 reglas de política de adquisiciones
                      Panel3Detail2: Brechas de cumplimiento identificadas y elementos marcados que requieren atención
                      Panel3Detail3: Informe de validación detallado con hallazgos explicables generado
                      Panel3Title: Validación de documentos
                      Panel4Desc: La IA calcula una puntuación de riesgo compuesta en tres dimensiones — estabilidad financiera, cumplimiento de políticas y validez de certificaciones — proporcionando una calificación objetiva y auditable sobre 100.
                      Panel4Detail1: Estados financieros analizados para indicadores de estabilidad y liquidez
                      Panel4Detail2: Historial de cumplimiento, certificaciones y alineación de políticas cruzados
                      Panel4Detail3: Puntuación de riesgo compuesta ponderada con desglose completo producida
                      Panel4Title: Cálculo de riesgo
                      Panel5Desc: 'Basándose en el contexto completo — datos extraídos, puntuación de riesgo, hallazgos de validación y política — la IA decidió el camino del proceso de forma autónoma: aprobar, solicitar aclaración o rechazar.'
                      Panel5Detail1: Todas las entradas evaluadas contra reglas de decisión de enrutamiento configurables
                      Panel5Detail2: Ruta de resultado óptima determinada sin triaje humano
                      Panel5Detail3: Rama de flujo de trabajo apropiada activada con rastro de auditoría completo
                      Panel5Title: Enrutamiento autónomo
                      Panel6Desc: La solicitud de incorporación ha sido completamente procesada y cerrada. Todos los datos extraídos, decisiones de IA, hallazgos de validación y el rastro de auditoría completo están permanentemente registrados y accesibles para revisión de cumplimiento.
                      Panel6Detail1: Todas las decisiones e razonamientos de IA registrados en el registro de auditoría permanente
                      Panel6Detail2: Registro del proveedor actualizado en el sistema con el resultado final
                      Panel6Detail3: Partes interesadas notificadas de la decisión y finalización del proceso
                      Panel6Title: Caso cerrado
                    StartDemo:
                      AfterItem1: El proveedor carga documentos una vez a través de un formulario estructurado y guiado
                      AfterItem2: La IA visual extrae automáticamente 15+ campos de PDFs en segundos — sin entrada manual
                      AfterItem3: 12+ reglas de política de adquisiciones verificadas al instante con razonamiento completo de IA
                      AfterItem4: 'Enrutamiento autónomo: aprobar, solicitar aclaración o rechazar — sin clasificación manual'
                      AfterItem5: Puntuación de riesgo compuesta de estabilidad financiera, cumplimiento y datos de certificación
                      AfterItem6: Cada decisión, dato extraído y razonamiento de IA registrado permanentemente
                      AiPoweredHeader: Smart Workflow impulsado por IA
                      BeforeItem1: El proveedor envía documentos por correo — adquisiciones busca entre archivos adjuntos
                      BeforeItem2: El personal lee PDFs manualmente y escribe datos en hojas de cálculo o formularios ERP
                      BeforeItem3: Las verificaciones de cumplimiento son ad-hoc, inconsistentes y se realizan días después del envío
                      BeforeItem4: El enrutamiento de aprobación se decide en reuniones de comité — retrasos de semanas
                      BeforeItem5: La evaluación de riesgos depende del juicio personal, sin estándar de puntuación
                      BeforeItem6: Las decisiones viven en hilos de correo — sin rastro de auditoría estructurado para cumplimiento
                      BeforeYouStartDesc: La demo le pide cargar documentos sobre una empresa para que la IA pueda extraer información, evaluar riesgos y puntuar al proveedor. Hemos preparado estos documentos para usted — simplemente descárguelos y úselos cuando se le indique durante la demo. Luego haga
                        clic en <strong>Generar datos</strong> a continuación para configurar el entorno de demo.
