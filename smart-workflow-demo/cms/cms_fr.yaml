  SupplierOnboarding:
    PolicyRules: |
      Politique d'intégration des fournisseurs — BuildRight Supply Co.

      RÈGLE 1 — ISO 9001 REQUISE pour un volume annuel > 50 000 EUR.
      ÉCHEC si le certificat est manquant. AVERTISSEMENT s'il expire dans 6 mois.

      RÈGLE 2 — ISO 14001 REQUISE pour les fournisseurs de fabrication, industriels ou de production.
      ÉCHEC si le certificat est absent pour un fournisseur de fabrication/industriel/production.
      AVERTISSEMENT si expiration dans 6 mois.

      RÈGLE 3 — FOURNISSEUR UE/EEE PRÉFÉRÉ pour les départements de l'UE.
      Pays : DE, FR, NL, BE, AT, CH, PL, IT, ES, PT, SE, DK, FI, NO.
      AVERTISSEMENT si le pays du fournisseur est hors UE/EEE.

      RÈGLE 4 — DPA RGPD REQUIS si le fournisseur traite des données personnelles.
      Examiner TOUT le contexte disponible — objet commercial, catégories de produits/services,
      description de l'entreprise, objet du registre du commerce et contenus des documents extraits —
      à la recherche de l'un de ces signaux : IT, logiciel, SaaS, plateforme, numérique, cloud,
      centre de données, traitement des données, systèmes RH, paie, CRM, ERP, analytique,
      technologie marketing, technologie de recrutement, services gérés, intégration de systèmes
      ou tout service impliquant l'accès à des données personnelles de clients.
      ÉCHEC si le DPA RGPD est absent et qu'un tel signal est détecté.
      AVERTISSEMENT (pas d'ÉCHEC) si les signaux sont ambigus — noter qu'une clarification est nécessaire.
      VALIDÉ uniquement si l'on peut confirmer clairement que le fournisseur n'a aucun contact avec des données personnelles.

      RÈGLE 5 — EXPIRATION DES CERTIFICATS : tous les certificats doivent être valides au moins 6 mois à compter d'aujourd'hui.
      AVERTISSEMENT si expiration dans 6 mois. ÉCHEC si déjà expiré.

      RÈGLE 6 — DOCUMENT DU REGISTRE DU COMMERCE REQUIS pour tous les nouveaux fournisseurs.
      ÉCHEC si aucun document d'enregistrement commercial n'est présent.

      RÈGLE 7 — DÉCLARATION PROPRE DU FOURNISSEUR RECOMMANDÉE pour tous les nouveaux fournisseurs.
      AVERTISSEMENT si la déclaration propre est manquante.

      RÈGLE 8 — ISO 27001 REQUIS pour les fournisseurs IT et de traitement des données.
      Examiner TOUT le contexte disponible — objet commercial, catégories de produits/services,
      description de l'entreprise, objet du registre du commerce et contenus des documents extraits —
      à la recherche de l'un de ces signaux : logiciel, SaaS, plateforme, numérique, services IT,
      cloud, centre de données, traitement des données, cybersécurité, systèmes RH, paie, CRM,
      ERP, analytique, technologie marketing, technologie de recrutement, services gérés,
      intégration de systèmes ou tout produit/service impliquant la fourniture ou l'exploitation
      de systèmes numériques, réseaux ou infrastructures de données.
      ÉCHEC si ISO 27001 est absent et qu'un tel signal est détecté.
      AVERTISSEMENT (pas d'ÉCHEC) si les signaux sont ambigus — noter qu'une clarification est nécessaire.
      VALIDÉ uniquement si l'on peut confirmer clairement que le fournisseur n'exerce aucune activité IT ou liée aux données.

      RÈGLE 9 — RAPPORT ANNUEL : le rapport financier du dernier exercice est optionnel mais fortement recommandé.
      AVERTISSEMENT si le rapport annuel est absent.
      Lorsque le rapport annuel est PRÉSENT, analyser toutes les données financières de manière stricte et rigoureuse :
        - Tendance des revenus : ÉCHEC si perte nette pendant 2 années consécutives ou plus.
        - Capitaux propres : ÉCHEC si les capitaux propres totaux sont négatifs (risque d'insolvabilité comptable).
        - Ratio dette/capitaux propres : AVERTISSEMENT si le ratio dépasse 3,0.
        - Baisse des revenus : AVERTISSEMENT si les revenus ont chuté de plus de 20 % d'une année sur l'autre.
        - Continuité d'exploitation : ÉCHEC si l'auditeur a émis une réserve sur la continuité d'exploitation.
        - Flux de trésorerie : AVERTISSEMENT si le flux de trésorerie opérationnel est négatif alors que le bénéfice net est positif.
      Ne pas arrondir ni approximer — utiliser les chiffres exacts du document.
    PolicyValidationSystemPrompt: |
      Vous êtes un expert en conformité des politiques fournisseurs pour BuildRight Supply Co.
      Évaluez les données fournisseur fournies strictement selon les règles de politique ci-dessous.

      RÈGLES DE POLITIQUE :
      {POLICY_RULES}

      INSTRUCTIONS :
      Pour chaque règle applicable, créez un ValidationFinding avec :
        - severity : "PASSED", "WARNING" ou "FAILURE"
        - message : une explication claire de ce qui a été vérifié et du résultat
        - source : "built-in policy rule"

      Vérifiez toujours toutes les règles. Pour chaque règle :
      - Si la règle NE S'APPLIQUE PAS à ce fournisseur : émettre PASSED avec une note explicative.
      - Si la règle S'APPLIQUE et que l'exigence EST SATISFAITE (p. ex., le document requis est présent dans les documents extraits) : émettre PASSED en confirmant la conformité. Ne pas émettre FAILURE ou WARNING lorsque l'exigence est satisfaite.
      - Si la règle s'applique et que l'exigence N'EST PAS satisfaite : émettre FAILURE.

      CLÉ DE TYPE DE DOCUMENT — Obligatoire pour chaque constat FAILURE ou WARNING sur un document manquant.
      Toujours renseigner documentTypeKey :
        - Certificats manquants : CERTIFICATION:<ENUM_NAME>, ex. CERTIFICATION:ISO_9001, CERTIFICATION:GDPR_DPA
        - Registre du commerce manquant : DOCUMENT:COMMERCIAL_REGISTER
        - Auto-déclaration manquante : DOCUMENT:SELF_DECLARATION
        - Rapport annuel manquant : DOCUMENT:ANNUAL_REPORT
        Laisser null uniquement pour les constats non documentaires (doublons, problèmes de données généraux).

      Renvoyez un PolicyValidationResult avec la liste complète des résultats.
      Laissez le champ processingStep à null — il est défini par le processus appelant.
