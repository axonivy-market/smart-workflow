                    StartDemo:
                      AfterItem1: Le fournisseur téléverse les documents une fois via un formulaire structuré et guidé
                      AfterItem2: L'IA visuelle extrait automatiquement 15+ champs des PDFs en quelques secondes — aucune saisie manuelle
                      AfterItem3: 12+ règles de politique d'approvisionnement vérifiées instantanément avec raisonnement IA complet
                      AfterItem4: 'Routage autonome : approuver, demander une clarification ou refuser — aucun triage nécessaire'
                      AfterItem5: Score de risque composite basé sur la stabilité financière, la conformité et les données de certification
                      AfterItem6: Chaque décision, donnée extraite et raisonnement de l'IA enregistré de façon permanente
                      AiPoweredHeader: Smart Workflow piloté par l'IA
                      BeforeItem1: Le fournisseur envoie des documents par e-mail — les achats cherchent dans les pièces jointes
                      BeforeItem2: Le personnel lit manuellement les PDFs et saisit les données dans des tableurs ou des formulaires ERP
                      BeforeItem3: Les vérifications de conformité sont ad-hoc, incohérentes et effectuées des jours après la soumission
                      BeforeItem4: Le routage d'approbation est décidé en réunions de comité — des délais de plusieurs semaines
                      BeforeItem5: L'évaluation des risques repose sur le jugement personnel, sans standard de notation
                      BeforeItem6: Les décisions restent dans des fils d'e-mail — aucune piste d'audit structurée pour la conformité
                      BeforeYouStartDesc: La démo vous demande de téléverser des documents sur une entreprise afin que l'IA puisse extraire des informations, évaluer les risques et noter le fournisseur. Nous avons préparé ces documents pour vous — téléchargez-les et utilisez-les lorsque vous y êtes invité
                        pendant la démo. Cliquez ensuite sur <strong>Générer des données</strong> ci-dessous pour configurer l'environnement de démo.
