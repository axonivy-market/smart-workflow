                    FinishDemo:
                      HeroSub: Nous espérons que vous avez vécu une excellente expérience avec <strong>Smart Workflow</strong>.<br/>Voici un résumé de tout ce que l'IA a géré pour vous — de manière autonome, précise et entièrement traçable.
                      PageTitle: Smart Workflow — Résumé du processus IA
                      Panel0Desc: Le processus d'intégration commence lorsqu'un fournisseur soumet sa demande via le portail Smart Workflow. Tous les documents justificatifs requis — immatriculation commerciale, certificats fiscaux et états financiers — sont téléversés à cette étape.
                      Panel0Detail1: Le fournisseur complète le profil de l'entreprise et les coordonnées
                      Panel0Detail2: Téléverse les documents de certification et financiers requis
                      Panel0Detail3: Smart Workflow valide l'exhaustivité du téléversement avant traitement
                      Panel0Num: Étape 01 sur 07
                      Panel0Tag1: Portail fournisseur
                      Panel0Tag2: Chargement de documents
                      Panel0Tag3: Démarrage du flux de travail
                      Panel0Title: Chargement de documents
                      Panel1Desc: L'IA lit les PDFs téléversés à l'aide de modèles de vision-langage, identifie les champs de données fournisseur dans plusieurs documents et pré-remplit automatiquement l'ensemble du formulaire d'intégration — sans saisie manuelle.
                      Panel1Detail1: Structures et tableaux PDF analysés avec des modèles de vision-langage
                      Panel1Detail2: Plus de 15 champs de données fournisseur identifiés et extraits automatiquement
                      Panel1Detail3: Formulaire d'intégration complet rempli automatiquement avec des données validées
                      Panel1Num: Étape 02 sur 07
                      Panel1Tag1: LLM
                      Panel1Tag2: Sortie structurée
                      Panel1Tag3: Multi-document
                      Panel1Tag4: Aucune saisie manuelle
                      Panel1Title: Extraction de documents par IA
                      Panel2Desc: Un assistant IA propulsé par RAG est disponible sur chaque écran — répondant aux questions sur les règles de politique, expliquant les exigences de conformité et clarifiant les seuils de risque en temps réel.
                      Panel2Detail1: Documents de politique récupérés par recherche de similarité vectorielle
                      Panel2Detail2: Questions des fournisseurs et des examinateurs répondues tout au long du processus
                      Panel2Detail3: Conseils de conformité contextuels fournis à chaque étape
                      Panel2Num: Étape 03 sur 07
                      Panel2Tag1: RAG
                      Panel2Tag2: Recherche vectorielle
                      Panel2Tag3: Agent de chat
                      Panel2Tag4: Conscient du contexte
                      Panel2Title: Guide contextuel Q&R
                      Panel3Desc: L'IA compare tous les documents soumis aux règles de politique d'achats, identifiant les certifications manquantes, les accréditations expirées et les lacunes de conformité — avec un raisonnement complet et une traçabilité totale.
                      Panel3Detail1: Tous les documents validés contre plus de 12 règles de politique d'achats
                      Panel3Detail2: Lacunes de conformité identifiées et éléments nécessitant attention signalés
                      Panel3Detail3: Rapport de validation détaillé avec des résultats explicables généré
                      Panel3Num: Étape 04 sur 07
                      Panel3Tag1: Moteur de règles
                      Panel3Tag2: Référence croisée
                      Panel3Tag3: IA explicable
                      Panel3Tag4: Traçabilité
                      Panel3Title: Validation de documents
                      Panel4Desc: L'IA calcule un score de risque composite selon trois dimensions — stabilité financière, conformité aux politiques et validité des certifications — fournissant une évaluation objective et auditable sur 100.
                      Panel4Detail1: États financiers analysés pour les indicateurs de stabilité et de liquidité
                      Panel4Detail2: Historique de conformité, certifications et alignement politique recoupés
                      Panel4Detail3: Score de risque composite pondéré avec ventilation complète produit
                      Panel4Num: Étape 05 sur 07
                      Panel4Tag1: Analyse financière
                      Panel4Tag2: Modèle de risque
                      Panel4Tag3: Score pondéré
                      Panel4Tag4: Noté /100
                      Panel4Title: Calcul du risque
                      Panel5Desc: 'Sur la base du contexte complet — données extraites, score de risque, résultats de validation et politique — l''IA a décidé du chemin du processus de manière autonome : approuver, demander des clarifications ou refuser.'
                      Panel5Detail1: Toutes les entrées évaluées par rapport aux règles de décision de routage configurables
                      Panel5Detail2: Chemin de résultat optimal déterminé sans triage humain
                      Panel5Detail3: Branche de flux de travail appropriée déclenchée avec une piste d'audit complète
                      Panel5Num: Étape 06 sur 07
                      Panel5Tag1: Moteur de décision
                      Panel5Tag2: IA agentique
                      Panel5Tag3: Zéro triage
                      Panel5Tag4: Autonome
                      Panel5Title: Routage autonome
                      Panel6Desc: La demande d'intégration a été entièrement traitée et clôturée. Toutes les données extraites, décisions IA, résultats de validation et la piste d'audit complète sont enregistrés de manière permanente et accessibles pour la révision de conformité.
                      Panel6Detail1: Toutes les décisions et raisonnements IA enregistrés dans le journal d'audit permanent
                      Panel6Detail2: Dossier fournisseur mis à jour dans le système avec le résultat final
                      Panel6Detail3: Parties prenantes notifiées de la décision et de l'achèvement du processus
                      Panel6Num: Étape 07 sur 07
                      Panel6Tag1: Piste d'audit
                      Panel6Tag2: Conformité
                      Panel6Tag3: Processus terminé
                      Panel6Title: Dossier clôturé
