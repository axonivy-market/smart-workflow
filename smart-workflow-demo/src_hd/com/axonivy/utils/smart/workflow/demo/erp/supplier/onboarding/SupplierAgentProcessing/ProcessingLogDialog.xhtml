<ui:composition xmlns="http://www.w3.org/1999/xhtml"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:p="http://primefaces.org/ui">
  <p:dialog header="Processing Log"
    widgetVar="processingLogDialog"
    modal="true"
    resizable="false"
    dynamic="true"
    styleClass="so-help-dialog"
    width="520">
    <div class="so-tl">
      <ui:repeat value="#{data.agentResponse.processingSteps}" var="step" varStatus="status">
        <div class="so-tl-item">
          <!-- Left: connector line + status bubble -->
          <div class="so-tl-left">
            <div class="so-tl-bubble #{supplierAgentProcessingBean.getStepBubbleClass(step)}">
              <i class="ti #{supplierAgentProcessingBean.getStepStatusIcon(step)}" />
            </div>
            <ui:fragment rendered="#{not status.last}">
              <div class="so-tl-line" />
            </ui:fragment>
          </div>
          <!-- Right: card -->
          <div class="so-tl-card">
            <div class="so-tl-card-header">
              <span class="so-tl-card-title"><h:outputText value="#{step.name}" /></span>
              <span class="so-tl-card-time"><h:outputText value="#{supplierAgentProcessingBean.getFormattedDuration(step)}" /></span>
            </div>
            <ui:fragment rendered="#{not empty step.logLines}">
              <div class="so-tl-lines">
                <ui:repeat value="#{step.logLines}" var="line">
                  <div class="so-tl-line-item #{supplierAgentProcessingBean.getSeverityClass(line.severity)}">
                    <i class="ti #{supplierAgentProcessingBean.getSeverityIcon(line.severity)}" />
                    <span class="#{line.italic ? 'font-italic' : ''}"><h:outputText value="#{line.message}" /></span>
                  </div>
                </ui:repeat>
              </div>
            </ui:fragment>
          </div>
        </div>
      </ui:repeat>
    </div>
  </p:dialog>
</ui:composition>
