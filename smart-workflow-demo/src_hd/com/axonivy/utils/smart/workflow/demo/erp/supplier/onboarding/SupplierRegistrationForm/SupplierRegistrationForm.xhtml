<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <f:metadata>
    <f:event type="preRenderView" listener="#{supplierRegistrationFormBean.init(data.request)}" />
  </f:metadata>
  <ui:composition template="/layouts/template/SupplierOnboardingTemplate.xhtml">

    <ui:param name="status"         value="SUPPLIER_DATA" />
    <ui:param name="stepSubtitle"   value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierRegistrationForm/StepSubtitle')}" />
    <ui:param name="initialMessage" value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierRegistrationForm/InitialMessage')}" />
    <ui:param name="chips"          value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierRegistrationForm/Chips')}" />
    <ui:param name="assistantUploadEnabled" value="true" />
    <ui:param name="assistantBean"          value="#{supplierRegistrationFormBean}" />

    <ui:define name="form-content">
      <h:form id="form" styleClass="p-fluid">

        <ic:com.axonivy.utils.smart.workflow.demo.erp.supplier.onboarding.components.SupplierDetails
          id="supplierDetails"
          bean="#{supplierRegistrationFormBean}" />

      </h:form>
    </ui:define>

    <ui:define name="footer-right">
      <p:commandButton id="submit" value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/erp/supplier/onboarding/SupplierRegistrationForm/SubmitButton')}"
        icon="pi pi-arrow-right" iconPos="right"
        actionListener="#{supplierRegistrationFormBean.submitForValidation}"
        process="@(form)"
        update="@(form) form-messages"
        styleClass="ui-button-primary" />
    </ui:define>

  </ui:composition>
</h:body>

</html>
