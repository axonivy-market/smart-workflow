<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/CVInput/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="cv-form">
        <div class="grid">

          <div class="col-12">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/CVInput/Title')}">

              <div class="grid">

                <!-- CV Text -->
                <div class="col-12 lg:col-6">
                  <p:outputLabel for="cv-text"
                    value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/CVInput/CvLabel')}" />
                  <p:inputTextarea id="cv-text"
                    value="#{data.cvText}"
                    rows="12"
                    autoResize="false"
                    styleClass="w-full" />
                </div>

                <!-- Job Description -->
                <div class="col-12 lg:col-6">
                  <p:outputLabel for="job-description"
                    value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/CVInput/JobDescriptionLabel')}" />
                  <p:inputTextarea id="job-description"
                    value="#{data.jobDescription}"
                    rows="12"
                    autoResize="false"
                    styleClass="w-full" />
                </div>

              </div>

              <!-- Submit -->
              <div class="flex justify-content-end mt-4">
                <p:commandButton
                  value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/CVInput/ScreenButton')}"
                  actionListener="#{logic.close}"
                  icon="pi pi-search"
                  styleClass="p-button-primary" />
              </div>

            </p:panel>
          </div>

        </div>
      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
