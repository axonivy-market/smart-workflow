<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="review-form">
        <div class="grid">

          <!-- Candidate Profile Summary -->
          <div class="col-12 lg:col-4">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/ProfileTitle')}">
              <div class="grid">
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/NameLabel')}" />
                </div>
                <div class="col-7">
                  <h:outputText value="#{data.profile.fullName}" />
                </div>
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/EmailLabel')}" />
                </div>
                <div class="col-7">
                  <h:outputText value="#{data.profile.email}" />
                </div>
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/ExperienceLabel')}" />
                </div>
                <div class="col-7">
                  <h:outputText value="#{data.profile.yearsOfExperience}" />
                </div>
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/SkillsLabel')}" />
                </div>
                <div class="col-7">
                  <h:outputText value="#{data.profile.skills}" />
                </div>
              </div>
            </p:panel>
          </div>

          <!-- Fit Score -->
          <div class="col-12 lg:col-4">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/FitScoreTitle')}">
              <div class="grid">
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/ScoreLabel')}" />
                </div>
                <div class="col-7">
                  <p:badge value="#{data.fitScore.score}" severity="#{data.fitScore.qualified ? 'success' : 'danger'}" />
                </div>
                <div class="col-5 font-bold">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/QualifiedLabel')}" />
                </div>
                <div class="col-7">
                  <h:outputText value="#{data.fitScore.qualified}" />
                </div>
                <div class="col-12 font-bold mt-2">
                  <h:outputText value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/RecommendationLabel')}" />
                </div>
                <div class="col-12">
                  <h:outputText value="#{data.fitScore.recommendation}" />
                </div>
              </div>
            </p:panel>
          </div>

          <!-- Communication Draft -->
          <div class="col-12 lg:col-4">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/DraftTitle')}">
              <p:inputTextarea id="communication-draft"
                value="#{data.communicationDraft}"
                rows="12"
                autoResize="false"
                styleClass="w-full" />
            </p:panel>
          </div>

        </div>

        <!-- Submit -->
        <div class="flex justify-content-end mt-2">
          <p:commandButton
            value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/jobapplicationscreeningdemo/ReviewCommunication/SendButton')}"
            actionListener="#{logic.close}"
            icon="pi pi-send"
            styleClass="p-button-primary" />
        </div>

      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
