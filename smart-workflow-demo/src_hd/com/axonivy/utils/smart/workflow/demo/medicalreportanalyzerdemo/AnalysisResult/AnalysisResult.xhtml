<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/AnalysisResult/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="result-form">
        <div class="grid">

          <div class="col-12">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/AnalysisResult/Title')}">

              <div class="col-12">
                <p:outputLabel value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/AnalysisResult/ResultLabel')}" />
                <p:inputTextarea id="analysis-result"
                  value="#{data.analysisResult}"
                  rows="16"
                  autoResize="false"
                  readonly="true"
                  styleClass="w-full mt-2" />
              </div>

              <div class="flex justify-content-end mt-4">
                <p:commandButton
                  value="#{ivy.cms.co('/Labels/Close')}"
                  actionListener="#{logic.close}"
                  icon="pi pi-times"
                  styleClass="p-button-secondary" />
              </div>

            </p:panel>
          </div>

        </div>
      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
