<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/ReportInput/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="report-form">
        <div class="grid">

          <div class="col-12">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/ReportInput/Title')}">

              <p:outputLabel for="report-text"
                value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/ReportInput/ReportLabel')}" />
              <p:inputTextarea id="report-text"
                value="#{data.reportText}"
                rows="14"
                autoResize="false"
                styleClass="w-full mt-2" />

              <div class="flex justify-content-end mt-4">
                <p:commandButton
                  value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/medicalreportanalyzerdemo/ReportInput/AnalyzeButton')}"
                  actionListener="#{logic.close}"
                  icon="pi pi-microscope"
                  styleClass="p-button-primary" />
              </div>

            </p:panel>
          </div>

        </div>
      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
