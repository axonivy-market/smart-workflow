<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="feedback-form">
        <div class="grid">

          <div class="col-12">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/Title')}">

              <p:dataTable id="feedback-table"
                value="#{data.feedbackList.items}"
                var="item"
                editable="true"
                editMode="row"
                rowKey="#{item.title}"
                styleClass="w-full">

                <p:column headerText="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/TitleCol')}"
                  width="25%">
                  <p:cellEditor>
                    <f:facet name="output">
                      <h:outputText value="#{item.title}" />
                    </f:facet>
                    <f:facet name="input">
                      <p:inputText value="#{item.title}" styleClass="w-full" />
                    </f:facet>
                  </p:cellEditor>
                </p:column>

                <p:column headerText="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/DescriptionCol')}"
                  width="35%">
                  <p:cellEditor>
                    <f:facet name="output">
                      <h:outputText value="#{item.description}" />
                    </f:facet>
                    <f:facet name="input">
                      <p:inputTextarea value="#{item.description}" rows="2" styleClass="w-full" />
                    </f:facet>
                  </p:cellEditor>
                </p:column>

                <p:column headerText="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/TypeCol')}"
                  width="15%">
                  <p:cellEditor>
                    <f:facet name="output">
                      <h:outputText value="#{item.type}" />
                    </f:facet>
                    <f:facet name="input">
                      <p:inputText value="#{item.type}" styleClass="w-full" />
                    </f:facet>
                  </p:cellEditor>
                </p:column>

                <p:column headerText="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/AssigneeCol')}"
                  width="15%">
                  <p:cellEditor>
                    <f:facet name="output">
                      <h:outputText value="#{item.assignee}" />
                    </f:facet>
                    <f:facet name="input">
                      <p:inputText value="#{item.assignee}" styleClass="w-full" />
                    </f:facet>
                  </p:cellEditor>
                </p:column>

                <p:column width="10%">
                  <p:rowEditor />
                </p:column>

              </p:dataTable>

              <!-- Submit -->
              <div class="flex justify-content-end mt-4">
                <p:commandButton
                  value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/FeedbackReview/ConfirmButton')}"
                  actionListener="#{logic.close}"
                  icon="pi pi-check"
                  styleClass="p-button-primary" />
              </div>

            </p:panel>
          </div>

        </div>
      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
