<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      #{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/Title')}
    </ui:define>
    <ui:define name="content">

      <h:form id="transcript-form">
        <div class="grid">

          <div class="col-12">
            <p:panel header="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/Title')}">

              <div class="grid">

                <!-- Transcript Textarea -->
                <div class="col-12">
                  <p:outputLabel for="transcript-text"
                    value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/TranscriptLabel')}" />
                  <p:inputTextarea id="transcript-text"
                    value="#{data.transcriptText}"
                    rows="10"
                    autoResize="false"
                    styleClass="w-full" />
                </div>

                <!-- File Upload -->
                <div class="col-12">
                  <p:separator />
                  <p:outputLabel value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/UploadLabel')}" />
                  <div class="mt-2">
                    <p:fileUpload
                      listener="#{logic.handleUpload}"
                      multiple="false"
                      mode="advanced"
                      auto="true"
                      update="transcript-form"
                      allowTypes="/(\.|\/)(txt|vtt)$/"
                      uploadLabel="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/UploadButton')}"
                      cancelLabel="#{ivy.cms.co('/Labels/Cancel')}" />
                  </div>
                </div>

                <!-- Language Selector -->
                <div class="col-12 md:col-6">
                  <p:outputLabel for="target-language"
                    value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/LanguageLabel')}" />
                  <p:selectOneMenu id="target-language"
                    value="#{data.targetLanguage}"
                    styleClass="w-full">
                    <f:selectItem itemLabel="English (default)" itemValue="EN" />
                    <f:selectItem itemLabel="German (DE)" itemValue="DE" />
                    <f:selectItem itemLabel="French (FR)" itemValue="FR" />
                    <f:selectItem itemLabel="Spanish (ES)" itemValue="ES" />
                  </p:selectOneMenu>
                </div>

              </div>

              <!-- Submit -->
              <div class="flex justify-content-end mt-4">
                <p:commandButton
                  value="#{ivy.cms.co('/Dialogs/com/axonivy/utils/smart/workflow/demo/meetingminutesdemo/TranscriptInput/AnalyzeButton')}"
                  actionListener="#{logic.close}"
                  icon="pi pi-cogs"
                  styleClass="p-button-primary" />
              </div>

            </p:panel>
          </div>

        </div>
      </h:form>

    </ui:define>
  </ui:composition>
</h:body>
</html>
