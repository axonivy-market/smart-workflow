<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui">

<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">
      <ui:insert name="page-title">Supplier Onboarding</ui:insert>
    </ui:define>

    <ui:define name="content">

      <ui:param name="assistantUploadEnabled" value="false" />
      <!-- Pages may override assistantBean to bind the sidebar to a different bean.
           Defaults to supplierRequestBean when not provided. -->
      <ui:param name="resolvedAssistantBean" value="#{assistantBean != null ? assistantBean : supplierRequestBean}" />

      <!-- Stylesheet -->
      <h:outputStylesheet library="css" name="supplier-onboarding.css" />
      <h:outputStylesheet library="css" name="supplier-onboarding-#{ivyFreyaTheme.mode}.css" />

      <!-- Stepper + step banner -->
      <ic:com.axonivy.utils.smart.workflow.demo.erp.supplier.onboarding.components.SupplierOnboardingSteps
        status="#{status}"
        stepTitle="Supplier Onboarding"
        stepSubtitle="#{stepSubtitle}" />

      <!-- Main 2-column content area — fixed/resizable AI panel -->
      <div class="so-body-columns">

        <!-- Left: form content + sticky footer -->
        <div class="so-form-column flex flex-column">
          <p:messages id="form-messages" />
          <div class="so-main-content flex-1">
            <ui:insert name="form-content">
              <!-- Default placeholder — pages override this slot -->
            </ui:insert>
          </div>
          <!-- Sticky footer inside form column -->
          <div class="so-page-footer">
            <div class="so-page-footer-left">
              <ui:insert name="footer-left" />
            </div>
            <h:panelGroup layout="block" id="footer-right-panel" styleClass="so-page-footer-right">
              <ui:insert name="footer-right" />
            </h:panelGroup>
          </div>
        </div>

        <!-- Resize handle -->
        <div class="so-resize-handle" id="so-resize-handle"></div>

        <!-- Right: AI assistant placeholder -->
        <div class="so-ai-col" id="so-ai-col">
          <div class="so-sidebar-placeholder" style="height:100%;">
            <p class="so-sidebar-placeholder-title">AI Assistant</p>
            <p class="so-sidebar-placeholder-note">Chatbot will be implemented in another PR.</p>
          </div>
        </div>

      </div>

      <script>
        (function () {
          function initPanelResize() {
            var handle = document.getElementById('so-resize-handle');
            var panel  = document.getElementById('so-ai-col');
            if (!handle || !panel) return;

            var MIN_W = 300, MAX_W = 600;
            var startX, startW;

            handle.addEventListener('mousedown', function (e) {
              startX = e.clientX;
              startW = panel.offsetWidth;
              handle.classList.add('so-dragging');
              document.body.style.cursor     = 'col-resize';
              document.body.style.userSelect = 'none';

              function onMove(e) {
                var delta = startX - e.clientX;
                var w = Math.min(MAX_W, Math.max(MIN_W, startW + delta));
                panel.style.width = w + 'px';
                panel.style.flex  = '0 0 ' + w + 'px';
              }

              function onUp() {
                handle.classList.remove('so-dragging');
                document.body.style.cursor     = '';
                document.body.style.userSelect = '';
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup',   onUp);
              }

              document.addEventListener('mousemove', onMove);
              document.addEventListener('mouseup',   onUp);
              e.preventDefault();
            });
          }

          if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initPanelResize);
          } else {
            initPanelResize();
          }
        })();
      </script>

    </ui:define>
  </ui:composition>
</h:body>
</html>
