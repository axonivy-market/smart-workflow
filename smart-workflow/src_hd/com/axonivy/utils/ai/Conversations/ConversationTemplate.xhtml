<html xmlns="http://www.w3.org/1999/xhtml"
  xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html"
  xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component"
  xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
<div class="cv-task-block #{taskStatus.even ? 'cv-task-block--even' : 'cv-task-block--odd'}">

    <div class="cv-task-sep flex align-items-start justify-content-between py-2 px-1 mb-2 gap-3">
        <div class="flex align-items-center gap-2 min-w-0">
            <span class="cv-task-sep-dot flex-shrink-0 border-circle" />
            <span class="font-semibold">#{task.displayName}</span>
        </div>

        <div class="flex flex-column align-items-end gap-1 flex-shrink-0 text-color-secondary text-sm">
            <span>#{task.messageCount} msgs &#183; #{task.totalTokens} tokens &#183; #{task.modelName}</span>
            <span>#{task.lastUpdatedText}</span>
        </div>
    </div>

    <div class="cv-chat-msgs flex flex-column gap-3">
        <ui:repeat var="msg" value="#{conversationsBean.parseMessages(task.entry)}">

            <h:panelGroup rendered="#{msg.role == 'system'}" layout="block"
                        styleClass="cv-msg cv-msg--system">
            <div class="cv-system-block py-2 px-4">
                <div class="cv-system-label mb-1 font-bold uppercase">System Prompt</div>
                <div>#{msg.text}</div>
            </div>
            </h:panelGroup>

            <h:panelGroup rendered="#{msg.role == 'user'}" layout="block"
                        styleClass="cv-msg cv-msg--user">
            <div class="cv-msg-role cv-msg-role--user">User</div>
            <div class="cv-bubble cv-bubble-user py-3 px-4">#{msg.text}</div>
            </h:panelGroup>

            <h:panelGroup rendered="#{msg.role == 'assistant'}" layout="block"
                        styleClass="cv-msg cv-msg--agent">
            <div class="cv-msg-role cv-msg-role--agent">Agent</div>
            <div class="cv-bubble cv-bubble-ai py-3 px-4">#{msg.text}</div>
            </h:panelGroup>

            <h:panelGroup rendered="#{msg.role == 'tool'}" layout="block"
                        styleClass="cv-msg cv-msg--tool">
            <div class="cv-msg-role cv-msg-role--tool">Tool</div>
            <div class="cv-bubble cv-bubble-tool py-2 px-3">
                <div class="cv-tool-label">OUTPUT</div>
                #{msg.text}
            </div>
            </h:panelGroup>

        </ui:repeat>
    </div>
</div>
</h:body>
</html>
