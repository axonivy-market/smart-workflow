<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">Conversations</ui:define>
    <ui:define name="content">

      <div class="content-area mx-auto p-4">

        <div class="mb-4 flex align-items-center gap-3">
          <h:form id="backForm">
            <p:commandButton id="back-btn" value="Back" icon="pi pi-arrow-left"
                             styleClass="ui-button-secondary"
                             process="@this"
                             actionListener="#{logic.close}" />
          </h:form>
          <h2 class="text-2xl font-bold text-900 m-0">Conversations</h2>
        </div>

        <div class="section-card surface-card border-round overflow-hidden">
          <div class="section-header surface-ground flex align-items-center font-semibold">
            <span>&#128172; Conversation — Case: #{data.caseUuid}</span>
          </div>
          <div class="p-4 text-color-secondary">
            Conversation viewer coming soon.
          </div>
        </div>

      </div>

    </ui:define>
  </ui:composition>
</h:body>
</html>
