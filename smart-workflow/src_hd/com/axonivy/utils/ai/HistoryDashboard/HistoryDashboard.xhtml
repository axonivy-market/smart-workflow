<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">AI Governance Center</ui:define>
    <ui:define name="content">

      <h:outputStylesheet library="css" name="history-dashboard.css" />
      <h:outputScript library="js" name="history-dashboard.js" />

      <div class="content-area mx-auto">

        <div class="mb-4">
          <h2 class="text-2xl font-bold text-900 mt-0 mb-1">AI Governance Center</h2>
        </div>

        <h:form id="main-form">

          <!-- Section 1: History Table -->
          <div class="card mb-4">

            <h:panelGroup id="history-table-section" layout="block">

              <div class="section-header flex justify-content-between align-items-center font-semibold text-lg">
                <span>History Table</span>
                <span class="font-normal text-color-secondary">#{historyDashboardBean.caseCount} cases - #{historyDashboardBean.entryCount} tasks</span>
              </div>

              <div class="filter-bar">
                <div class="grid align-items-center">
                  <div class="col-fixed">
                    <span>Filter by:</span>
                  </div>
                  <div class="col">
                    <p:inputText value="#{historyDashboardBean.filterCase}"
                                 placeholder="Case name, ID or description"
                                 styleClass="w-full"
                                 onkeydown="if(event.keyCode===13){document.getElementById('main-form:filter-search-btn').click();return false;}" />
                    <p:commandButton id="filter-search-btn"
                                     action="#{historyDashboardBean.applyFilter}"
                                     update="history-table-section"
                                     style="display:none" />
                  </div>
                  <div class="col-3">
                    <p:selectOneMenu value="#{historyDashboardBean.filterModel}" styleClass="w-full">
                      <f:selectItem itemValue="" itemLabel="All models" />
                      <f:selectItem itemValue="gpt-4o-mini" itemLabel="gpt-4o-mini" />
                      <f:selectItem itemValue="gpt-4o" itemLabel="gpt-4o" />
                      <f:selectItem itemValue="gemini-2.0" itemLabel="gemini-2.0" />
                      <p:ajax listener="#{historyDashboardBean.applyFilter}"
                              update="history-table-section" />
                    </p:selectOneMenu>
                  </div>
                  <div class="col-2">
                    <p:selectOneMenu value="#{historyDashboardBean.filterDateRange}" styleClass="w-full">
                      <f:selectItem itemValue="ALL" itemLabel="All time" />
                      <f:selectItem itemValue="TODAY" itemLabel="Today" />
                      <f:selectItem itemValue="LAST_7_DAYS" itemLabel="Last 7 days" />
                      <f:selectItem itemValue="LAST_30_DAYS" itemLabel="Last 30 days" />
                      <p:ajax listener="#{historyDashboardBean.applyFilter}"
                              update="history-table-section" />
                    </p:selectOneMenu>
                  </div>
                </div>
              </div>

              <p:treeTable id="history-table"
                           value="#{historyDashboardBean.historyTree}" var="row"
                           styleClass="history-table"
                           emptyMessage="No history records found."
                           sortField="caseId" sortOrder="DESCENDING" sortMode="single">

                <p:column headerText="Case/Task/Agent" sortBy="#{row.caseId}" width="30%">
                  <h:outputText value="#{row.caseDisplayName}"
                                rendered="#{row['class'].simpleName eq 'CaseHistoryGroup'}"
                                styleClass="font-semibold" />
                  <h:outputText value="#{row.taskDisplayName}"
                                rendered="#{row['class'].simpleName eq 'TaskHistoryGroup'}"
                                styleClass="text-color-secondary" />
                  <h:outputText value="Agent #{row.agentId}"
                                rendered="#{row['class'].simpleName eq 'AgentConversationEntry'}"/>
                </p:column>

                <p:column headerText="Last updated" sortBy="#{row.lastUpdatedRaw}" width="10%">
                  <h:outputText value="#{row.lastUpdatedText}" />
                </p:column>

                <p:column headerText="Messages" sortBy="#{row.messageCount}" width="10%">
                  <span class="badge bg-blue-100 text-blue-700 border-round-3xl inline-block">#{row.messageCount} msgs</span>
                </p:column>

                <p:column headerText="Tokens" sortBy="#{row.totalTokens}" width="10%">
                  <span class="badge bg-green-100 text-green-700 border-round-3xl inline-block">#{row.totalTokens}</span>
                </p:column>

                <p:column headerText="Model" sortBy="#{row.modelName}" width="20%">
                  <span class="model-chip surface-ground border-round-sm">#{row.modelName}</span>
                </p:column>

                <p:column headerText="" styleClass="col-action" width="7%">
                  <p:commandButton value="View" icon="tif tif-eye" process="@this"
                                   rendered="#{row['class'].simpleName eq 'CaseHistoryGroup'}"
                                   actionListener="#{logic.showConversations(row.caseUuid)}" />
                </p:column>

              </p:treeTable>

            </h:panelGroup>
          </div>

          <!-- Section 2: Token Usage Analytics (placeholder) -->
          <div class="card">
            <div class="section-header flex justify-content-between align-items-center font-semibold text-lg">
              <span>Token Usage Analytics</span>
              <span class="font-normal text-color-secondary">Coming soon</span>
            </div>
          </div>

        </h:form>
      </div>

    </ui:define>
  </ui:composition>
</h:body>
</html>
