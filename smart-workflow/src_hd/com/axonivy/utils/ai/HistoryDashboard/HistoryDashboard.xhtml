<html xmlns="http://www.w3.org/1999/xhtml" xmlns:f="http://xmlns.jcp.org/jsf/core"
  xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:ic="http://ivyteam.ch/jsf/component" xmlns:p="http://primefaces.org/ui"
  xmlns:pe="http://primefaces.org/ui/extensions">
<h:body>
  <ui:composition template="/layouts/frame-10-full-width.xhtml">
    <ui:define name="title">History Command Center</ui:define>
    <ui:define name="content">

      <h:outputStylesheet library="css" name="history-dashboard.css" />
      <h:outputScript library="js" name="history-dashboard.js" />

      <div class="content-area mx-auto p-4">

        <div class="mb-4">
          <h2 class="text-2xl font-bold text-900 mt-0 mb-1">AI Governance Center</h2>
          <p class="text-sm text-color-secondary m-0">Browse and filter AI agent conversation history.</p>
        </div>

        <h:form id="main-form">

          <!-- Section 1: History Table -->
          <div class="section-card surface-card border-round overflow-hidden mb-4">

            <h:panelGroup id="history-table-section" layout="block">

              <div class="section-header surface-ground flex align-items-center font-semibold">
                <span><i class="tif tif-clipboard mr-1"></i>History Table (#{historyDashboardBean.caseCount} cases, #{historyDashboardBean.entryCount} tasks)</span>
              </div>

              <div class="filter-bar flex flex-wrap gap-2 align-items-center">
                <p:inputText value="#{historyDashboardBean.filterCase}"
                             placeholder="Case name, ID or description"
                             styleClass="filter-case-input" />
                <p:selectOneMenu value="#{historyDashboardBean.filterModel}"
                                 styleClass="filter-model-select">
                  <f:selectItem itemValue="" itemLabel="All Models" />
                  <f:selectItem itemValue="gpt-4o-mini" itemLabel="gpt-4o-mini" />
                  <f:selectItem itemValue="gpt-4o" itemLabel="gpt-4o" />
                  <f:selectItem itemValue="gemini-2.0" itemLabel="gemini-2.0" />
                </p:selectOneMenu>
                <p:selectOneMenu value="#{historyDashboardBean.filterDateRange}"
                                 styleClass="filter-date-select">
                  <f:selectItem itemValue="ALL" itemLabel="All time" />
                  <f:selectItem itemValue="TODAY" itemLabel="Today" />
                  <f:selectItem itemValue="LAST_7_DAYS" itemLabel="Last 7 days" />
                  <f:selectItem itemValue="LAST_30_DAYS" itemLabel="Last 30 days" />
                </p:selectOneMenu>
                <p:commandButton value="Search"
                                 action="#{historyDashboardBean.applyFilter}"
                                 update="history-table-section"
                                 icon="tif tif-search" />
              </div>

              <p:treeTable id="history-table"
                           value="#{historyDashboardBean.historyTree}" var="row"
                           styleClass="history-table"
                           emptyMessage="No history records found.">

                <p:column headerText="Case / Task" styleClass="col-case">
                  <h:outputText value="#{row.caseDisplayName}"
                                rendered="#{row['class'].simpleName eq 'CaseHistoryGroup'}"
                                styleClass="font-semibold" />
                  <h:outputText value="#{row.taskDisplayName}"
                                rendered="#{row['class'].simpleName eq 'ChatHistoryEntry'}"
                                styleClass="text-color-secondary" />
                </p:column>

                <p:column headerText="Last Updated" styleClass="col-date">
                  <h:outputText value="#{row.lastUpdatedText}" />
                </p:column>

                <p:column headerText="Messages" styleClass="col-messages">
                  <span class="badge bg-blue-100 text-blue-700 border-round-3xl inline-block font-semibold">#{row.messageCount} msgs</span>
                </p:column>

                <p:column headerText="Tokens" styleClass="col-tokens">
                  <span class="badge bg-green-100 text-green-700 border-round-3xl inline-block font-semibold">#{row.totalTokens}</span>
                </p:column>

                <p:column headerText="Model" styleClass="col-model">
                  <span class="model-chip text-sm surface-ground border-round-sm">#{row.modelName}</span>
                </p:column>

                <p:column headerText="" styleClass="col-action">
                  <p:commandButton value="View" icon="tif tif-eye" process="@this"
                                   rendered="#{row['class'].simpleName eq 'CaseHistoryGroup'}"
                                   actionListener="#{logic.showConversations(row.caseUuid)}" />
                </p:column>

              </p:treeTable>

            </h:panelGroup>
          </div>

          <!-- Section 2: Token Usage Analytics -->
          <div class="section-card surface-card border-round overflow-hidden">
            <ic:com.axonivy.utils.ai.component.Analytics id="analytics" />
          </div>

        </h:form>
      </div>

    </ui:define>
  </ui:composition>
</h:body>
</html>
