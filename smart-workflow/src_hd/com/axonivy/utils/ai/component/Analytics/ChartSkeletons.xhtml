<html xmlns="http://www.w3.org/1999/xhtml" xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
  xmlns:p="http://primefaces.org/ui">

<ui:composition>

  <!-- KPI card skeletons: 4 columns -->
  <div class="grid mb-4">
    <div class="col-3">
      <div class="kpi-card surface-ground border-round p-4">
        <p:skeleton width="55%" height="0.75rem" styleClass="mb-2" />
        <p:skeleton width="40%" height="2rem"    styleClass="mb-2" />
        <p:skeleton width="60%" height="0.65rem" />
      </div>
    </div>
    <div class="col-3">
      <div class="kpi-card surface-ground border-round p-4">
        <p:skeleton width="55%" height="0.75rem" styleClass="mb-2" />
        <p:skeleton width="40%" height="2rem"    styleClass="mb-2" />
        <p:skeleton width="60%" height="0.65rem" />
      </div>
    </div>
    <div class="col-3">
      <div class="kpi-card surface-ground border-round p-4">
        <p:skeleton width="55%" height="0.75rem" styleClass="mb-2" />
        <p:skeleton width="40%" height="2rem"    styleClass="mb-2" />
        <p:skeleton width="60%" height="0.65rem" />
      </div>
    </div>
    <div class="col-3">
      <div class="kpi-card surface-ground border-round p-4">
        <p:skeleton width="55%" height="0.75rem" styleClass="mb-2" />
        <p:skeleton width="50%" height="1.5rem"  styleClass="mb-2" />
        <p:skeleton width="65%" height="0.65rem" />
      </div>
    </div>
  </div>

  <!-- Chart skeletons row 1: bar chart (wide) + donut circle (narrow) -->
  <div class="grid mb-4">
    <div class="col-8">
      <div class="chart-panel surface-ground border-round p-3">
        <p:skeleton width="40%" height="0.75rem" styleClass="mb-3" />
        <p:skeleton width="100%" height="200px" />
      </div>
    </div>
    <div class="col-4">
      <div class="chart-panel surface-ground border-round p-3">
        <p:skeleton width="50%" height="0.75rem" styleClass="mb-3" />
        <div class="flex justify-content-center">
          <p:skeleton shape="circle" size="160px" />
        </div>
      </div>
    </div>
  </div>

  <!-- Chart skeletons row 2: stacked bar + horizontal bars (50/50) -->
  <div class="grid mb-4">
    <div class="col-6">
      <div class="chart-panel surface-ground border-round p-3">
        <p:skeleton width="55%" height="0.75rem" styleClass="mb-3" />
        <p:skeleton width="100%" height="180px" />
      </div>
    </div>
    <div class="col-6">
      <div class="chart-panel surface-ground border-round p-3">
        <p:skeleton width="50%" height="0.75rem" styleClass="mb-3" />
        <p:skeleton width="100%" height="1.5rem" styleClass="mb-2" />
        <p:skeleton width="82%"  height="1.5rem" styleClass="mb-2" />
        <p:skeleton width="60%"  height="1.5rem" styleClass="mb-2" />
        <p:skeleton width="44%"  height="1.5rem" styleClass="mb-2" />
        <p:skeleton width="28%"  height="1.5rem" />
      </div>
    </div>
  </div>

  <!-- Chart skeleton row 3: full-width response time histogram -->
  <div class="chart-panel surface-ground border-round p-3">
    <p:skeleton width="40%" height="0.75rem" styleClass="mb-3" />
    <p:skeleton width="58%"  height="1.5rem" styleClass="mb-2" />
    <p:skeleton width="100%" height="1.5rem" styleClass="mb-2" />
    <p:skeleton width="42%"  height="1.5rem" styleClass="mb-2" />
    <p:skeleton width="48%"  height="1.5rem" />
  </div>

</ui:composition>

</html>
